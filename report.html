<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>รายงาน — COOPKKU</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="config.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap');
  body { font-family:'Sarabun',sans-serif; background:#f4f7fb; padding:20px; }
  .header { display:flex; justify-content:space-between; align-items:center; background:#1e3a8a; color:#fff; padding:20px; border-radius:12px; margin-bottom:20px; }
  .btn { padding:10px 16px; border:none; border-radius:8px; cursor:pointer; color:#fff; font-weight:600; text-decoration:none; margin-left:5px;}
  table { width:100%; border-collapse:collapse; background:#fff; margin-top:20px; border-radius:8px;} 
  th, td { padding:14px; border:1px solid #e2e8f0; text-align:center; font-size:14px; }
  th { background:#f1f5f9; color:#1e3a8a; }
  .val-used { color:#ef4444; font-weight:bold; }
</style>
</head>
<body>
<div class="header">
  <h2 style="margin:0;">📈 รายงานสรุปการใช้วันลาบุคลากร</h2>
  <div>
    <a href="index.html" class="btn" style="background:#f59e0b;">🏠 กลับ</a>
    <button class="btn" style="background:#10b981;" onclick="exportExcel()">📊 Excel</button>
    <button class="btn" style="background:#3b82f6;" onclick="exportImage()">🖼️ รูปภาพ</button>
    <button class="btn" style="background:#ef4444;" onclick="exportPDF()">📄 PDF</button>
  </div>
</div>

<div style="background:#fff; padding:20px; border-radius:12px;">
  <b>เลือกปีบัญชี:</b> <select id="fySelect" onchange="loadReport()" style="padding:10px; border-radius:8px;"></select>
  <div id="reportWrap" style="overflow-x:auto;">
    <table id="reportTable"><thead id="tHead"></thead><tbody id="tBody"></tbody></table>
  </div>
</div>

<script>
  const db = window.supabase.createClient(AppConfig.SUPABASE_URL, AppConfig.SUPABASE_ANON_KEY);
  window.onload = async () => {
    const y = new Date().getFullYear();
    document.getElementById('fySelect').innerHTML = [0,1,2].map(i => `<option value="${y-i}">ปีบัญชี ${y-i}</option>`).join('');
    loadReport();
  };

  async function loadReport() {
    const y = parseInt(document.getElementById('fySelect').value);
    const { data: emps } = await db.from('employees').select('*').eq('status', 'active').order('department');
    const { data: leaves } = await db.from('leave_requests').select('*').eq('status', 'approved').gte('start_date', `${y-1}-12-01`).lte('start_date', `${y}-11-30`);

    const activeTypes = AppConfig.LEAVE_TYPES.filter(lt => (leaves||[]).some(l => l.leave_type === lt.name));
    
    let th = `<tr><th>ลำดับ</th><th style="text-align:left;">ชื่อ-สกุล</th><th>แผนก</th>` + activeTypes.map(lt => `<th>${lt.name}</th>`).join('') + `</tr>`;
    document.getElementById('tHead').innerHTML = th;

    let tb = '';
    (emps||[]).forEach((e, i) => {
      tb += `<tr><td>${i+1}</td><td style="text-align:left;">${e.name}</td><td>${e.department}</td>`;
      activeTypes.forEach(lt => {
        const used = (leaves||[]).filter(l => l.line_user_id === e.line_user_id && l.leave_type === lt.name).reduce((sum, l) => sum + Number(l.duration), 0);
        tb += `<td class="${used > 0 ? 'val-used' : ''}">${used > 0 ? used : '-'}</td>`;
      });
      tb += `</tr>`;
    });
    document.getElementById('tBody').innerHTML = tb;
  }

  function exportExcel() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("reportTable")), `รายงานวันลา_${document.getElementById('fySelect').value}.xlsx`); }
  function exportImage() { html2canvas(document.getElementById('reportWrap')).then(canvas => { let a = document.createElement('a'); a.download = 'report.png'; a.href = canvas.toDataURL(); a.click(); }); }
  function exportPDF() { html2canvas(document.getElementById('reportWrap')).then(c => { const pdf = new window.jspdf.jsPDF('l', 'pt', 'a4'); pdf.addImage(c.toDataURL('image/png'), 'PNG', 20, 20, pdf.internal.pageSize.getWidth()-40, (c.height*(pdf.internal.pageSize.getWidth()-40))/c.width); pdf.save('report.pdf'); }); }
</script>
</body>
</html>
