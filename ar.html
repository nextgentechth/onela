<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>โหมดหมุนด้วยมือ — ระบบจับสลาก</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Kanit:wght@500;600;700;800;900&display=swap');

:root{
  --bg0:#050510;--gold:#f5c842;--orange:#ff6b35;--teal:#00d4aa;--red:#ff4757;
  --r12:12px;--r16:16px;--r24:24px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg0);}
body{font-family:'Sarabun',sans-serif;color:#fff;}

/* ── Stage ── */
.stage{position:fixed;inset:0;background:#050510;overflow:hidden;}

.ar-video,.ar-skeleton,.ar-wheel-canvas{
  position:absolute;top:0;left:0;width:100%;height:100%;
  object-fit:cover;transform:scaleX(-1);
}
.ar-video{z-index:1;}
.ar-skeleton{z-index:2;pointer-events:none;}
.ar-wheel-canvas{z-index:3;pointer-events:none;transform:none;}

/* ซ่อน Pointer เดิมแบบ CSS เพราะเราจะวาดใน Canvas แทน */
.ar-pointer{ display: none; }

.topbar{
  position:absolute;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:.8rem 1rem;padding-top:calc(.8rem + env(safe-area-inset-top));
  background:linear-gradient(180deg,rgba(0,0,0,.7),transparent);
}
.btn-close{
  width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  color:#fff;font-size:1.1rem;display:flex;align-items:center;justify-content:center;
  cursor:pointer;backdrop-filter:blur(6px);
}
.title-pill{
  font-family:'Kanit',sans-serif;font-size:.85rem;font-weight:600;
  background:rgba(0,0,0,.35);padding:.35rem .8rem;border-radius:20px;
  backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.15);
}

.status-pill{
  position:absolute;left:50%;top:calc(1rem + env(safe-area-inset-top) + 3.2rem);
  transform:translateX(-50%);z-index:10;
  font-family:'Kanit',sans-serif;font-size:.78rem;font-weight:600;
  padding:.45rem 1.1rem;border-radius:24px;
  background:rgba(0,0,0,.5);backdrop-filter:blur(8px);
  border:1.5px solid rgba(255,255,255,.15);color:#fff;
  display:flex;align-items:center;gap:.4rem;white-space:nowrap;
  transition:border-color .25s,color .25s,background .25s;
}
.status-pill.st-wave{border-color:var(--teal);color:var(--teal);background:rgba(0,212,170,.12);}
.status-pill.st-fist{border-color:var(--orange);color:var(--orange);background:rgba(255,107,53,.16);}
.status-pill .dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:dotPulse 1s ease infinite;}
@keyframes dotPulse{50%{opacity:.3;transform:scale(.7);}}

.bottom{
  position:absolute;left:0;right:0;bottom:0;z-index:10;
  padding:1rem 1.2rem;padding-bottom:calc(1rem + env(safe-area-inset-bottom));
  background:linear-gradient(0deg,rgba(0,0,0,.75),transparent);text-align:center;
}
.hint{font-size:.8rem;color:#ddd;line-height:1.5;margin-bottom:.6rem;}
.hint b{color:var(--gold);}
.hold-wrap{height:6px;background:rgba(255,255,255,.15);border-radius:10px;overflow:hidden;margin-bottom:.4rem; display:none;}
.hold-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--red));width:0%;border-radius:10px;transition:width .12s linear;}
.hold-label{font-size:.68rem;color:#9090bb; display:none;}

.loading,.error-box{
  position:absolute;inset:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(5,5,16,.97);text-align:center;padding:2rem;gap:1rem;
}
.ring{width:56px;height:56px;border-radius:50%;border:4px solid rgba(245,200,66,.2);border-top-color:var(--gold);animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p,.error-box p{font-family:'Kanit',sans-serif;font-size:.92rem;color:#ddd;max-width:300px;line-height:1.6;}
.error-box .icon{font-size:2.6rem;}
.btn-fallback{
  padding:.75rem 1.6rem;border:none;border-radius:var(--r12);
  background:linear-gradient(135deg,var(--gold),var(--orange));
  color:#000;font-family:'Kanit',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;
}

.burst{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  z-index:15;pointer-events:none;
  font-family:'Kanit',sans-serif;font-weight:800;font-size:3rem;color:var(--gold);
  text-shadow:0 0 30px rgba(245,200,66,.8);opacity:0;
}
.burst.fire{animation:burstAnim .6s ease-out forwards;}
@keyframes burstAnim{
  0%{transform:translate(-50%,-50%) scale(.3);opacity:0;}
  30%{transform:translate(-50%,-50%) scale(1.15);opacity:1;}
  100%{transform:translate(-50%,-50%) scale(1.5);opacity:0;}
}

.winner-card{
  position:absolute;inset:0;z-index:30;display:none;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,.88);backdrop-filter:blur(8px);padding:1.2rem;
}
.winner-card.show{display:flex;}
.win-popup{
  background:linear-gradient(160deg,#10103a,#1a1a50);
  border:1px solid var(--gold);border-radius:var(--r24);
  padding:1.8rem;max-width:340px;width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,.8),0 0 28px rgba(245,200,66,.35);
  text-align:center;animation:popIn .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.confetti{font-size:1.8rem;letter-spacing:3px;margin-bottom:.5rem;}
.win-msg{font-size:.82rem;color:#9090bb;}
.win-name{font-family:'Kanit',sans-serif;font-size:1.25rem;font-weight:800;color:var(--gold);margin:.3rem 0 .8rem;line-height:1.25;}
.win-box{background:rgba(0,0,0,.3);border:1px solid rgba(245,200,66,.18);border-radius:var(--r12);padding:.9rem;margin-bottom:1.1rem;}
.win-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:.45rem;}
.win-row:last-child{margin-bottom:0;}
.wr-lbl{font-size:.74rem;color:#9090bb;}
.wr-val{font-family:'Kanit',sans-serif;font-size:.88rem;font-weight:700;}
.wr-ord{color:var(--gold);font-size:1.05rem;}
.btn-done{
  width:100%;padding:.85rem;border:none;border-radius:var(--r12);
  background:linear-gradient(135deg,var(--teal),#00a882);
  color:#000;font-family:'Kanit',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;
}

.toast{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(100px);
  background:#14143a;border:1px solid rgba(245,200,66,.3);border-radius:var(--r12);
  padding:.75rem 1.4rem;font-size:.88rem;white-space:nowrap;
  box-shadow:0 8px 40px rgba(0,0,0,.6);transition:transform .3s ease;z-index:300;
}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.err{border-color:var(--red);color:var(--red);}

@media(prefers-reduced-motion:reduce){
  .ring,.status-pill .dot,.confetti{animation:none!important;}
}
</style>
</head>
<body>

<div class="stage">
  <video id="video" class="ar-video" autoplay playsinline muted></video>
  <canvas id="skeleton" class="ar-skeleton"></canvas>
  <canvas id="wheelCanvas" class="ar-wheel-canvas"></canvas>
  <div class="ar-pointer"></div>
  <div class="burst" id="burst">🎯</div>

  <div class="topbar">
    <div class="btn-close" onclick="goBack()">✕</div>
    <div class="title-pill">✋ โหมดหมุนด้วยมือ</div>
    <div style="width:38px"></div>
  </div>

  <div class="status-pill st-none" id="statusPill">
    <span class="dot"></span><span id="statusTxt">กำลังเตรียมข้อมูล…</span>
  </div>

  <div class="bottom">
    <div class="hint" id="hint">
      <b>กางมือ</b> เพื่อหมุนวงล้อให้เร็ว แล้ว <b>กำมือ</b> เพื่อปล่อยให้หยุดนิ่ง
    </div>
    <div class="hold-wrap"><div class="hold-fill" id="holdFill"></div></div>
    <div class="hold-label">ถือกำมือค้างไว้เพื่อยืนยันการหยุด</div>
  </div>

  <div class="loading" id="loadingBox">
    <div class="ring"></div>
    <p id="loadingMsg">📡 กำลังโหลดข้อมูลจากระบบ…</p>
  </div>

  <div class="error-box" id="errorBox" style="display:none">
    <div class="icon">📷🚫</div>
    <p id="errorMsg">ไม่สามารถเข้าถึงกล้องได้</p>
    <button class="btn-fallback" onclick="goBack()">กลับไปหน้าหลัก</button>
  </div>

  <div class="winner-card" id="winnerCard">
    <div class="win-popup">
      <div class="confetti">🎊 🏆 🎊</div>
      <div class="win-msg">คุณคือผู้โชคดี จับได้…</div>
      <div class="win-name" id="winName">—</div>
      <div class="win-box">
        <div class="win-row"><span class="wr-lbl">ลำดับที่</span><span class="wr-val wr-ord" id="winOrd">—</span></div>
        <div class="win-row"><span class="wr-lbl">ช่วงเอกสาร</span><span class="wr-val" id="winRange">—</span></div>
        <div class="win-row"><span class="wr-lbl">ประเภท</span><span class="wr-val" id="winType">—</span></div>
      </div>
      <button class="btn-done" onclick="goBack()">✨ รับทราบ</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
var qs = new URLSearchParams(window.location.search);
var API_URL = qs.get('api') || '';
var MEMBER_NAME = qs.get('name') || '';

var LOTS = [], RESULTS = [];
var BASE = -Math.PI/2;
var PALETTE=['#f5c842','#ff6b35','#00d4aa','#a78bfa','#fb7185','#38bdf8','#fbbf24','#34d399','#f472b6','#60a5fa','#facc15','#4ade80','#f87171','#818cf8','#2dd4bf','#fb923c','#c084fc','#86efac','#fca5a5','#93c5fd'];

var hands=null, camera=null, cameraActive=false, resolved=false;

// ตัวแปรควบคุมการหมุนและระยะเวลาหน่วงหยุด
var spinVelocity=0, handAngle=0, wheelAngle=0;
var isStopping = false; 
var stopStartTime = null; 
var STOP_DURATION = 4000; 
var startAngleForStop = 0; 

window.onload = function(){
  if(!API_URL){
    showError('ไม่พบข้อมูลการเชื่อมต่อ (ขาด parameter "api") กรุณาเปิดหน้านี้ผ่านปุ่ม "หมุนด้วยมือ" จากหน้าหลักเท่านั้น');
    return;
  }
  if(!MEMBER_NAME){
    showError('ไม่พบชื่อผู้จับสลาก กรุณาเลือกชื่อจากหน้าหลักก่อนเข้าโหมดมือ');
    return;
  }
  loadData();
};

function goBack(){
  window.close();
  setTimeout(function(){
    if(!window.closed){ window.location.href = API_URL || 'about:blank'; }
  }, 200);
}

// ── โหลดข้อมูลจาก Apps Script ─────────────────────────────────
function loadData(){
  document.getElementById('loadingMsg').textContent = '📡 กำลังโหลดข้อมูลจากระบบ…';
  fetch(API_URL + '?api=data')
    .then(function(r){ return r.json(); })
    .then(function(json){
      if(!json.ok){ showError('โหลดข้อมูลไม่สำเร็จ: ' + (json.msg||'')); return; }
      LOTS = json.data.lots;
      RESULTS = json.data.results;

      if(findResult('winner', MEMBER_NAME)){
        showError('คุณได้จับสลากไปแล้ว ไม่สามารถจับซ้ำได้');
        return;
      }
      if(getAvailable().length===0){
        showError('ไม่มีสลากคงเหลือให้จับแล้ว');
        return;
      }
      startCamera();
    })
    .catch(function(err){
      console.error(err);
      showError('เชื่อมต่อกับระบบหลักไม่สำเร็จ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่');
    });
}

function findResult(key,val){
  for(var i=0;i<RESULTS.length;i++){ if(RESULTS[i][key]==val) return RESULTS[i]; }
  return null;
}
function getAvailable(){
  var drawn = RESULTS.map(function(r){return r.order;});
  return LOTS.filter(function(l){ return !l.fixed && drawn.indexOf(l.order)<0; });
}

// ── การหาตำแหน่งกึ่งกลางวงล้อ ───────────────────────────────────
function getWheelGeometry() {
  var cv = document.getElementById('wheelCanvas');
  var W = cv.width, H = cv.height;
  var r = Math.min(W, H) * 0.22; 
  if(r > 110) r = 110;
  if(r < 65) r = 65;
  var cx = W - r - 25; 
  var cy = r + Math.max(80, (window.safeAreaInsetTop || 0) + 70); 
  return { cx: cx, cy: cy, r: r, W: W, H: H };
}

// ── วาดวงล้อ ───────────────────────────────────────────────────
function drawWheel(angle){
  var cv = document.getElementById('wheelCanvas');
  if(!cv) return;
  var ctx = cv.getContext('2d');
  
  var geo = getWheelGeometry();
  var cx = geo.cx, cy = geo.cy, r = geo.r, W = geo.W, H = geo.H;

  ctx.clearRect(0,0,W,H);

  var av = getAvailable();
  if(av.length===0){
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle='#1a1a50'; ctx.fill();
    ctx.strokeStyle='#f5c842'; ctx.lineWidth=3; ctx.stroke();
    ctx.fillStyle='#f5c842'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font='bold 14px Kanit,Sarabun,sans-serif';
    ctx.fillText('จับครบแล้ว! 🎉',cx,cy); return;
  }

  var n=av.length, sa=2*Math.PI/n, a0=BASE+angle;
  for(var i=0;i<n;i++){
    var s=a0+i*sa, e=s+sa;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,s,e); ctx.closePath();
    ctx.fillStyle=PALETTE[i%PALETTE.length]; ctx.fill();
    ctx.strokeStyle='#07071a'; ctx.lineWidth=1.5; ctx.stroke();

    ctx.save();
    ctx.translate(cx,cy); ctx.rotate(s+sa/2);
    ctx.textAlign='right'; ctx.fillStyle='rgba(0,0,0,.85)';
    var fs = n>18?11:n>12?12:14; 
    ctx.font='bold '+fs+'px Kanit,Sarabun,sans-serif';
    ctx.fillText(av[i].order, r-8, 4);
    ctx.restore();
  }
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(245,200,66,.5)'; ctx.lineWidth=3; ctx.stroke();

  // วาด Pointer (ลูกศรสีทอง)
  var ptrOffset = r + 4;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.beginPath();
  ctx.moveTo(0, -ptrOffset);
  ctx.lineTo(-12, -ptrOffset - 24);
  ctx.lineTo(12, -ptrOffset - 24);
  ctx.closePath();
  ctx.fillStyle = '#f5c842';
  ctx.shadowColor = 'rgba(245,200,66,0.8)';
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 2;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.9)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();
}

function resizeCanvases(){
  var stage = document.querySelector('.stage');
  var w = stage.clientWidth, h = stage.clientHeight;
  ['skeleton','wheelCanvas'].forEach(function(id){
    var cv = document.getElementById(id);
    cv.width=w; cv.height=h;
  });
  drawWheel(wheelAngle);
}
window.addEventListener('resize', function(){ if(cameraActive) resizeCanvases(); });
window.addEventListener('orientationchange', function(){ if(cameraActive) setTimeout(resizeCanvases,300); });

// ── เริ่มกล้อง + MediaPipe Hands ───────────────────────────────
function startCamera(){
  var video = document.getElementById('video');

  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    showError('อุปกรณ์หรือเบราว์เซอร์นี้ไม่รองรับการเข้าถึงกล้อง (ต้องใช้ผ่าน HTTPS)');
    return;
  }
  if(typeof Hands === 'undefined' || typeof Camera === 'undefined'){
    showError('ไม่สามารถโหลดระบบตรวจจับมือได้ (เครือข่ายช้าหรือเบราว์เซอร์ไม่รองรับ)');
    return;
  }

  document.getElementById('loadingMsg').textContent = '🎥 กำลังเปิดกล้องและโหลดระบบตรวจจับมือ…';

  try{
    hands = new Hands({
      locateFile: function(file){ return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/' + file; }
    });
    hands.setOptions({ maxNumHands:1, modelComplexity:1, minDetectionConfidence:0.6, minTrackingConfidence:0.6 });
    hands.onResults(onHandResults);

    camera = new Camera(video, {
      onFrame: async function(){
        try{ await hands.send({image:video}); }catch(e){}
      },
      width: 640, height: 480
    });

    camera.start().then(function(){
      cameraActive = true;
      document.getElementById('loadingBox').style.display='none';
      resizeCanvases();
    }).catch(function(err){
      console.error(err);
      showError('ไม่สามารถเข้าถึงกล้องได้ กรุณาอนุญาตการใช้กล้องในเบราว์เซอร์ แล้วลองใหม่');
    });
  }catch(e){
    console.error(e);
    showError('เกิดข้อผิดพลาดในการเริ่มระบบตรวจจับมือ');
  }
}

function showError(msg){
  document.getElementById('loadingBox').style.display='none';
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('errorBox').style.display = 'flex';
}

// ── ประมวลผลทุกเฟรมจาก MediaPipe ──────────────────────────────
function onHandResults(results){
  if(!cameraActive || resolved) return;
  var skelCv = document.getElementById('skeleton');
  var ctx = skelCv.getContext('2d');
  ctx.clearRect(0,0,skelCv.width,skelCv.height);

  var lm = (results.multiHandLandmarks && results.multiHandLandmarks[0]) || null;
  if(!lm){
    setStatus('none','กำลังค้นหามือ…');
    if(!isStopping) spinFriction(); // ถ้าเอามือออกให้หน่วงหยุดแบบปกติ
    return;
  }

  drawSkeleton(ctx, lm, skelCv.width, skelCv.height);
  
  var isFistNow = isFist(lm);
  var isOpenNow = isOpenHand(lm);

  if(isFistNow){
    // กำมือ: เริ่มจับเวลาหยุด 4 วินาที
    if(!isStopping){
      isStopping = true;
      stopStartTime = Date.now();
      startAngleForStop = handAngle;
      setStatus('fist','✊ กำลังปล่อยให้วงล้อชะลอตัวลง…');
      requestAnimationFrame(updateWheelLoop);
    }
  } else {
    // กางมือ: หมุนเพิ่มความเร็ว
    if(isOpenNow){
      isStopping = false; // ยกเลิกการหยุดถ้ากางมือใหม่
      handleOpenHand(); 
    } else {
      // ไม่กาง/ไม่กำชัดเจน: หน่วงหยุดปกติ
      if(!isStopping){
        setStatus('none','🖐️ กางมือเพื่อหมุนเร็ว หรือ ✊ กำมือเพื่อหยุด');
        spinFriction();
      }
    }
  }
}

function drawSkeleton(ctx, lm, W, H){
  var C=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],
         [0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
  ctx.lineWidth=3;
  ctx.strokeStyle = isStopping ? 'rgba(255,107,53,.9)' : 'rgba(0,212,170,.85)';
  C.forEach(function(c){
    var a=lm[c[0]], b=lm[c[1]];
    ctx.beginPath(); ctx.moveTo(a.x*W,a.y*H); ctx.lineTo(b.x*W,b.y*H); ctx.stroke();
  });
  ctx.fillStyle = isStopping ? '#ff6b35' : '#f5c842';
  lm.forEach(function(p){ ctx.beginPath(); ctx.arc(p.x*W,p.y*H,4.5,0,Math.PI*2); ctx.fill(); });
}

function isFist(lm){
  var wrist=lm[0];
  function dist(a,b){ var dx=a.x-b.x,dy=a.y-b.y; return Math.sqrt(dx*dx+dy*dy); }
  var tips=[8,12,16,20], mcps=[5,9,13,17];
  var curled=0;
  for(var i=0;i<4;i++){
    if(dist(wrist,lm[tips[i]]) < dist(wrist,lm[mcps[i]])*1.15) curled++;
  }
  return curled>=3;
}

function isOpenHand(lm){
  var wrist=lm[0];
  function dist(a,b){ var dx=a.x-b.x,dy=a.y-b.y; return Math.sqrt(dx*dx+dy*dy); }
  var tips=[8,12,16,20], mcps=[5,9,13,17];
  var extended=0;
  for(var i=0;i<4;i++){
    if(dist(wrist,lm[tips[i]]) > dist(wrist,lm[mcps[i]])*1.35) extended++;
  }
  if(dist(wrist,lm[4]) > dist(wrist,lm[2])*1.2) extended++; 
  return extended>=4; 
}

function handleOpenHand(){
  spinVelocity += 0.015;
  if(spinVelocity > 0.4) spinVelocity = 0.4; // จำกัดความเร็วสูงสุด

  handAngle += spinVelocity;
  wheelAngle = handAngle;
  drawWheel(wheelAngle);
  setStatus('wave','🖐️ หมุนเร็ว! กำมือค้างไว้เพื่อหยุดนิ่ง');
}

function spinFriction(){
  if(Math.abs(spinVelocity) > 0.001){
    spinVelocity *= 0.96; 
    handAngle += spinVelocity;
    wheelAngle = handAngle;
    drawWheel(wheelAngle);
  }
}

// ── Animation Loop สำหรับการหน่วงหยุด 4 วินาที ───────────────
function updateWheelLoop() {
  if (isStopping && stopStartTime && !resolved) {
    var elapsed = Date.now() - stopStartTime;
    var t = elapsed / STOP_DURATION; // 0.0 ถึง 1.0

    if (t < 1) {
      // Ease-out Cubic
      var easeOutCubic = 1 - Math.pow(1 - t, 3);
      var totalRotation = spinVelocity * 50; 
      handAngle = startAngleForStop + (totalRotation * easeOutCubic);
      wheelAngle = handAngle;
      
      drawWheel(wheelAngle);
      requestAnimationFrame(updateWheelLoop); 
    } else {
      isStopping = false;
      stopStartTime = null;
      confirmDrawBasedOnAngle(); 
    }
  }
}

// ── การคำนวณผู้โชคดีตามมุมที่หยุดนิ่ง ────────────────────────
function confirmDrawBasedOnAngle(){
  if(resolved) return;
  resolved = true;
  setStatus('fist','🎯 หยุดแล้ว! กำลังบันทึกผล…');

  // ย้ายตำแหน่งพลุให้ตรงกับวงล้อใหม่
  var geo = getWheelGeometry();
  var burstEl = document.getElementById('burst');
  if(burstEl) {
    burstEl.style.left = geo.cx + 'px';
    burstEl.style.top = geo.cy + 'px';
  }
  fireBurst();

  var av = getAvailable();
  if(av.length === 0) return;

  var n = av.length;
  var sa = 2 * Math.PI / n; 
  
  // แปลงมุมให้อยู่ในช่วงบวกเพื่อหา Index (สูตรป้องกันค่าติดลบ)
  var normAngle = ((-wheelAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
  var winnerIndex = Math.floor(normAngle / sa);
  
  // กันเหนียวกรณีปัดเศษพลาด
  if(winnerIndex >= n) winnerIndex = n - 1; 
  if(winnerIndex < 0) winnerIndex = 0;
  
  var winLot = av[winnerIndex];

  // ยิง API บันทึกผลไปยัง Google Apps Script
  setTimeout(function(){
    saveResult(winLot);
  }, 250);
}

function fireBurst(){
  var el=document.getElementById('burst');
  el.classList.remove('fire'); void el.offsetWidth; el.classList.add('fire');
}

// ── บันทึกผลกลับไปที่ Apps Script ──────────────────────────────
function saveResult(lot){
  fetch(API_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'}, 
    body: JSON.stringify({ action:'saveDraw', memberName:MEMBER_NAME, lotId:lot.id })
  })
  .then(function(r){ return r.json(); })
  .then(function(res){
    if(res.ok){ showWinner(res.result); }
    else{ toast('❌ '+res.msg,'err'); setTimeout(goBack, 2000); }
  })
  .catch(function(err){
    console.error(err);
    toast('❌ บันทึกผลไม่สำเร็จ กรุณาแจ้งแอดมิน','err');
  });
}

function showWinner(r){
  document.getElementById('winName').textContent = MEMBER_NAME;
  document.getElementById('winOrd').textContent = 'ลำดับที่ '+r.order;
  document.getElementById('winRange').textContent = r.range;
  document.getElementById('winType').textContent = r.type;
  document.getElementById('winnerCard').classList.add('show');
  stopCamera();
}

function stopCamera(){
  cameraActive=false;
  try{
    if(camera){ camera.stop(); camera=null; }
    if(hands){ hands.close(); hands=null; }
  }catch(e){}
  var video=document.getElementById('video');
  if(video && video.srcObject){
    video.srcObject.getTracks().forEach(function(t){ t.stop(); });
    video.srcObject=null;
  }
}

function setStatus(kind,text){
  var el=document.getElementById('statusPill');
  el.className='status-pill '+(kind==='wave'?'st-wave':kind==='fist'?'st-fist':'st-none');
  document.getElementById('statusTxt').textContent=text;
}

function toast(msg,type){
  var el=document.getElementById('toast');
  el.textContent=msg; el.className='toast '+(type||'');
  void el.offsetWidth; el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); },3000);
}

window.addEventListener('beforeunload', stopCamera);
</script>
