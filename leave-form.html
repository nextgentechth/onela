<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ยื่นใบลา — COOPKKU</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap');
  :root { --primary:#1e3a8a; --bg:#f1f5f9; --card:#ffffff; --border:#cbd5e1; }
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Sarabun',sans-serif; }
  body { background:var(--bg); color:#334155; display:flex; justify-content:center; padding:20px; min-height:100vh;}
  .card { background:var(--card); padding:30px; border-radius:20px; box-shadow:0 10px 25px rgba(0,0,0,0.05); width:100%; max-width:450px;}
  .header { display:flex; align-items:center; margin-bottom:25px; border-bottom:2px solid var(--bg); padding-bottom:15px;}
  .back-btn { text-decoration:none; color:var(--primary); font-size:24px; padding-right:15px; font-weight:bold;}
  h2 { color:var(--primary); font-size:20px;}
  .form-group { margin-bottom:20px; }
  label { display:block; margin-bottom:8px; font-weight:600; font-size:14px;}
  input, select, textarea { width:100%; padding:14px; border:1px solid var(--border); border-radius:12px; font-size:15px; background:#fff; outline:none;}
  .date-row { display:flex; gap:15px; flex-wrap:wrap;}
  .date-row .form-group { flex:1; min-width: 140px;}
  .btn { width:100%; background:var(--primary); color:#fff; padding:16px; border:none; border-radius:12px; font-weight:700; font-size:16px; cursor:pointer; margin-top:10px;}
  .btn:disabled { background:#94a3b8; cursor:not-allowed;}
</style>
</head>
<body>
<div class="card">
  <div class="header"><a href="index.html" class="back-btn">← กลับ</a><h2>ฟอร์มยื่นใบลา</h2></div>
  
  <div id="errorBox" style="display:none; background:#fef2f2; color:#ef4444; padding:15px; border-radius:10px; margin-bottom:20px; border:1px solid #fecaca; font-size:14px;"></div>
  
  <div class="form-group"><label>ประเภทการลา</label><select id="leaveType"></select></div>
  <div class="date-row">
    <div class="form-group"><label>วันที่เริ่มลา</label><input type="date" id="startDate"></div>
    <div class="form-group"><label>ถึงวันที่</label><input type="date" id="endDate"></div>
  </div>
  <div class="form-group"><label>เหตุผลการลา</label><textarea id="reason" rows="3"></textarea></div>
  
  <button class="btn" onclick="submitLeave()" id="btnSubmit">ยืนยันการยื่นลา</button>
</div>

<script>
  const db = window.supabase.createClient(AppConfig.SUPABASE_URL, AppConfig.SUPABASE_ANON_KEY);
  let user = null; let holidays = [];

  window.onload = async () => {
    document.getElementById('leaveType').innerHTML = AppConfig.LEAVE_TYPES.map(l => `<option value="${l.name}">${l.emoji} ${l.name}</option>`).join('');
    try {
      await liff.init({ liffId: AppConfig.LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href }); return; }
      
      const profile = await liff.getProfile();
      const { data, error } = await db.from('employees').select('*').eq('line_user_id', profile.userId).maybeSingle();
      
      if (error || !data) throw new Error("ไม่พบข้อมูลบัญชี กรุณาลงทะเบียนใหม่");
      user = data;
      
      const { data: h } = await db.from('corporate_holidays').select('holiday_date');
      if (h) holidays = h.map(x => x.holiday_date);
    } catch(err) { showError(err.message); }
  };

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.innerHTML = "<b>❌ ข้อผิดพลาด:</b><br>" + msg;
    box.style.display = 'block';
  }

  async function submitLeave() {
    document.getElementById('errorBox').style.display = 'none';
    const btn = document.getElementById('btnSubmit');
    const sDate = document.getElementById('startDate').value;
    const eDate = document.getElementById('endDate').value;
    const lType = document.getElementById('leaveType').value;
    
    if(!sDate || !eDate) return showError("กรุณาเลือกวันที่ให้ครบถ้วน");
    if(sDate > eDate) return showError("วันที่สิ้นสุดต้องไม่น้อยกว่าวันที่เริ่มต้น");

    btn.innerText = "⏳ กำลังบันทึกข้อมูล..."; btn.disabled = true;

    try {
      let days = 0; let cur = new Date(sDate); const end = new Date(eDate);
      while(cur <= end) {
        const dateStr = cur.toISOString().split('T')[0];
        if(cur.getDay() !== 0 && cur.getDay() !== 6 && !holidays.includes(dateStr)) days++;
        cur.setDate(cur.getDate() + 1);
      }

      if(days <= 0) { btn.innerText = "ยืนยันการยื่นลา"; btn.disabled = false; return showError('ช่วงเวลาที่คุณเลือกตรงกับวันหยุดทั้งหมดครับ'); }

      const reqId = 'LV' + Date.now();
      const initialStatus = user.position === 'เจ้าหน้าที่' ? 'pending_supervisor' : 'pending_manager';

      // 🌟 บันทึกข้อมูลลงฐานข้อมูลหลัก
      const { error: dbError } = await db.from('leave_requests').insert([{
        request_id: reqId, line_user_id: user.line_user_id, name: user.name, department: user.department, position: user.position,
        leave_type: lType, start_date: sDate, end_date: eDate, duration: days, period: 'full', reason: document.getElementById('reason').value || "-", status: initialStatus
      }]);

      if(dbError) throw new Error("บันทึกฐานข้อมูลไม่สำเร็จ: " + dbError.message);

      // 🌟 ค้นหาหัวหน้าเพื่อส่ง LINE
      const { data: managers } = await db.from('employees').select('line_user_id').eq('department', user.department).in('position', ['ผู้ช่วยผู้จัดการ', 'รองผู้จัดการ', 'ผู้จัดการ']);
      const managerIds = managers ? managers.map(m => m.line_user_id) : [];
      
      // ส่งคำสั่ง Background (ถ้าเกิด 404/400 จากฝั่ง GAS จะไม่ทำให้แอปค้างอีกต่อไป)
      window.sendLineNotify('notify_submit', managerIds, { name: user.name, department: user.department, leaveType: lType, startDate: sDate, endDate: eDate, duration: days });

      alert('✅ บันทึกข้อมูลและยื่นใบลาสำเร็จ!'); 
      window.location.replace('index.html');

    } catch(err) {
      showError(err.message);
      btn.innerText = "ยืนยันการยื่นลา"; btn.disabled = false; 
    }
  }
</script>
</body>
</html>
