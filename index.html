<script>
  let myUserId = '';

  async function callAPI(action, payloadData = {}) {
    const res = await fetch(AppConfig.GAS_URL, { method: 'POST', body: JSON.stringify({ action: action, ...payloadData }) });
    const result = await res.json();
    if (result.status === 'success') return result.data;
    throw new Error(result.message || 'API Error');
  }

  liff.init({ liffId: AppConfig.LIFF_ID }).then(() => {
    if (!liff.isLoggedIn()) { liff.login(); return; }
    liff.getProfile().then(p => { myUserId = p.userId; document.getElementById('uImg').src = p.pictureUrl || ''; loadDashboard(); });
  });

  // ... (ฟังก์ชัน loadDashboard และ switchTab คงเดิม) ...
  function loadDashboard() {
    callAPI('getDashboardData', { lineUserId: myUserId }).then(data => {
      document.getElementById('loading').classList.add('hide');
      if (!data || !data.employee || data.employee.status !== 'active') { window.location.replace('register.html'); return; }
      const emp = data.employee;
      document.getElementById('uName').innerText = emp.name;
      document.getElementById('uDept').innerText = emp.department + ' · ' + emp.position;
      if (data.canViewReport) document.getElementById('nav-report').classList.remove('hide');
      if (data.isApprover) document.getElementById('nav-approval').classList.remove('hide');
      let html = '';
      data.leaveConfig.forEach(lt => {
        const used = data.usedLeaves[lt.id] || 0;
        const quotaText = (typeof lt.quota === 'number') ? `สิทธิ: ${lt.quota} วัน` : lt.quota;
        html += `<div class="bal-item"><div class="bal-icon">${lt.emoji}</div><div class="bal-info"><div class="bal-name">${lt.name}</div><div class="bal-used">ใช้ไป: ${used} ${typeof lt.quota === 'number' ? 'วัน' : ''}</div><div class="bal-quota">${quotaText}</div></div></div>`;
      });
      document.getElementById('leaveGrid').innerHTML = html;
    }).catch(err => alert("Error: " + err.message));
  }

  function switchTab(tab) {
    document.getElementById('pg-home').classList.add('hide'); document.getElementById('pg-history').classList.add('hide'); document.getElementById('pg-approval').classList.add('hide');
    document.getElementById('nav-home').classList.remove('active'); document.getElementById('nav-history').classList.remove('active'); document.getElementById('nav-approval').classList.remove('active');
    document.getElementById('pg-'+tab).classList.remove('hide'); document.getElementById('nav-'+tab).classList.add('active');
    if(tab === 'history') loadHistory();
    if(tab === 'approval') loadApprovals();
  }

  // 🌟 ฟังก์ชันโหลดประวัติที่เพิ่ม "สถานะการติดตามแบบ Timeline"
  function loadHistory() {
    document.getElementById('historyList').innerHTML = '<div style="text-align:center; color:#666;">กำลังโหลด...</div>';
    callAPI('getLeavesByUser', { lineUserId: myUserId }).then(data => {
      if(!data || data.length === 0) { document.getElementById('historyList').innerHTML = '<div style="text-align:center; color:#999;">ไม่มีประวัติ</div>'; return; }
      
      callAPI('getDashboardData', { lineUserId: myUserId }).then(db => {
        const ln = {}; db.leaveConfig.forEach(lt => ln[lt.id] = lt.name);
        
        let html = '';
        data.forEach(r => {
          let statusUI = '';
          // วาดหน้าตาสถานะแบบละเอียด
          if (r.status === 'approved') {
            statusUI = `<div style="text-align:right;">
                          <div style="color:#10B981; font-size:13px; font-weight:bold;">✅ อนุมัติแล้ว</div>
                          <div style="font-size:11px; color:#555;">โดย ผจก. (${r.l2ApproverName})</div>
                        </div>`;
          } else if (r.status === 'rejected') {
            const by = r.l2ApproverName !== '-' ? r.l2ApproverName : (r.l1ApproverName !== '-' ? r.l1ApproverName : 'ระบบ');
            statusUI = `<div style="text-align:right;">
                          <div style="color:#EF4444; font-size:13px; font-weight:bold;">❌ ไม่อนุมัติ</div>
                          <div style="font-size:11px; color:#555;">โดย: ${by}</div>
                        </div>`;
          } else if (r.status === 'pending_supervisor') {
            statusUI = `<div style="text-align:right;">
                          <div style="color:#F59E0B; font-size:12px; font-weight:bold; background:#fffbeb; padding:4px 8px; border-radius:12px;">⏳ รอ ผช. อนุมัติ</div>
                        </div>`;
          } else if (r.status === 'pending_manager') {
            statusUI = `<div style="text-align:right;">
                          <div style="color:#8B5CF6; font-size:12px; font-weight:bold; background:#f3e8ff; padding:4px 8px; border-radius:12px;">⏳ รอ ผจก. อนุมัติ</div>
                          ${r.l1ApproverName !== '-' ? `<div style="font-size:11px; color:#10B981; margin-top:4px;">✓ ผ่าน ผช. (${r.l1ApproverName})</div>` : ''}
                        </div>`;
          }

          html += `
          <div class="history-item">
            <div>
              <div style="font-weight:bold; color:#1a3a6b;">${ln[r.leaveType] || r.leaveType} (${r.duration} วัน)</div>
              <div style="font-size:12px; color:#888;">📅 ${r.startDate} ${r.endDate !== r.startDate ? '- '+r.endDate : ''}</div>
            </div>
            ${statusUI}
          </div>`;
        });
        document.getElementById('historyList').innerHTML = html;
      });
    });
  }

  // 🌟 ฟังก์ชันโหลดรายการรออนุมัติ (ให้ L2 เห็นชื่อ L1 ที่อนุมัติมาด้วย)
  function loadApprovals() {
    document.getElementById('approvalList').innerHTML = '<div style="text-align:center; color:#666;">กำลังค้นหารายการ...</div>';
    callAPI('getPendingApprovals', { lineUserId: myUserId }).then(data => {
      if(!data || data.length === 0) { 
        document.getElementById('approvalList').innerHTML = '<div style="text-align:center; padding:20px; color:#999;">🎉 ไม่มีคำขอลาที่รออนุมัติ</div>'; 
        return; 
      }
      
      callAPI('getDashboardData', { lineUserId: myUserId }).then(db => {
        const ln = {}; db.leaveConfig.forEach(lt => ln[lt.id] = lt.name);
        let html = '';
        data.forEach(r => {
          // โชว์ว่าใครเซ็นผ่านมาแล้วบ้าง (เฉพาะตอนรอผู้จัดการ)
          let l1PassHtml = '';
          if (r.status === 'pending_manager' && r.l1ApproverName !== '-') {
            l1PassHtml = `<div style="font-size:12px; color:#10B981; margin-top:6px; background:#d1fae5; display:inline-block; padding:2px 8px; border-radius:8px;">✓ ผ่านการพิจารณาเบื้องต้นโดย: ${r.l1ApproverName}</div>`;
          }

          html += `
          <div class="history-item" style="flex-direction:column; align-items:flex-start; gap:8px;">
            <div style="width:100%; border-bottom:1px dashed #eef2f6; padding-bottom:8px; margin-bottom:4px;">
              <div style="font-weight:700; color:#1a3a6b; font-size:15px;">👤 ${r.name}</div>
              <div style="font-size:12px; color:#666;">ตำแหน่ง: ${r.position}</div>
            </div>
            <div style="width:100%; margin-bottom:8px;">
              <div style="font-size:14px; font-weight:600; color:#c8960c;">ประเภท: ${ln[r.leaveType] || r.leaveType} (${r.duration} วัน)</div>
              <div style="font-size:13px; color:#555;">📅 ${r.startDate} ${r.endDate !== r.startDate ? '- '+r.endDate : ''}</div>
              <div style="font-size:12px; color:#888; margin-top:4px;">เหตุผล: ${r.reason || '-'}</div>
              ${l1PassHtml}
            </div>
            <div style="display:flex; gap:10px; width:100%;">
              <button onclick="submitApproval('${r.requestId}', 'approved')" style="flex:1; padding:10px; background:#10B981; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">✅ อนุมัติ</button>
              <button onclick="submitApproval('${r.requestId}', 'rejected')" style="flex:1; padding:10px; background:#EF4444; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">❌ ไม่อนุมัติ</button>
            </div>
          </div>`;
        });
        document.getElementById('approvalList').innerHTML = html;
      });
    });
  }

  function submitApproval(reqId, decision) {
    let note = '';
    if (decision === 'rejected') {
      note = prompt('โปรดระบุเหตุผลที่ไม่อนุมัติ (ถ้ามี):') || '';
    } else {
      if(!confirm('ยืนยันการ "อนุมัติ" รายการนี้ใช่หรือไม่?')) return;
    }

    document.getElementById('loading').classList.remove('hide');
    callAPI('processApprovalFromWeb', { 
      lineUserId: myUserId, 
      reqId: reqId, 
      decision: decision, 
      note: note 
    }).then(res => {
      document.getElementById('loading').classList.add('hide');
      alert('✅ ดำเนินการบันทึกสำเร็จ');
      loadApprovals(); 
    }).catch(err => {
      document.getElementById('loading').classList.add('hide');
      alert('❌ เกิดข้อผิดพลาด: ' + err.message);
    });
  }
</script>
