<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>เข้าสู่ระบบจัดการ — COOPKKU</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap');
  body { font-family:'Sarabun',sans-serif; background:#f0f4f8; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;}
  .login-box { background:#fff; padding:40px; border-radius:16px; box-shadow:0 10px 25px rgba(0,0,0,0.05); width:90%; max-width:400px; text-align:center; }
  input { width:100%; padding:14px; margin-bottom:15px; border:1px solid #cbd5e1; border-radius:10px; font-family:'Sarabun'; outline:none; }
  .btn { width:100%; background:#1a3a6b; color:#fff; padding:14px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; }
</style>
</head>
<body>
<div class="login-box">
  <h2 style="color:#1a3a6b; margin-bottom:20px;">COOPKKU Backoffice</h2>
  <input type="email" id="email" placeholder="Email (Username)" required>
  <input type="password" id="password" placeholder="Password" required>
  <button class="btn" onclick="login()">เข้าสู่ระบบ</button>
  <p id="msg" style="color:red; margin-top:15px; display:none;"></p>
</div>
<script>
  const supabase = supabase.createClient(AppConfig.SUPABASE_URL, AppConfig.SUPABASE_ANON_KEY);
  async function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) { document.getElementById('msg').innerText = "❌ อีเมลหรือรหัสผ่านไม่ถูกต้อง"; document.getElementById('msg').style.display='block'; }
    else window.location.href = 'admin.html';
  }
</script>
</body>
</html>
