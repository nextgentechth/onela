<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ลงทะเบียนบุคลากร</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap');
  body { font-family:'Sarabun',sans-serif; background:#f4f7fb; padding:20px; display:flex; justify-content:center; align-items:center; min-height:90vh; margin:0;}
  .card { background:#fff; padding:30px; border-radius:16px; box-shadow:0 4px 15px rgba(0,0,0,0.05); width:100%; max-width:400px; text-align:center;}
  label { display:block; text-align:left; font-weight:bold; color:#1a3a6b; margin-top:15px; margin-bottom:5px; font-size:14px;}
  input, select { width:100%; padding:12px; border:1px solid #ccc; border-radius:8px; font-family:'Sarabun'; outline:none; font-size:15px;}
  .btn { width:100%; background:#1a3a6b; color:#fff; padding:15px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; margin-top:25px; font-size:16px;}
  .avatar { width:80px; height:80px; border-radius:50%; margin:0 auto 10px; display:block; object-fit:cover; border:3px solid #e0e7ff;}
  .hide { display:none; }
</style>
</head>
<body>
<div class="card" id="regForm">
  <img id="uImg" src="https://via.placeholder.com/150" class="avatar">
  <h2 style="color:#1a3a6b; margin-bottom:5px;">ลงทะเบียนพนักงาน</h2>
  <p style="color:#64748b; font-size:13px; margin-bottom:20px;">กรุณากรอกข้อมูลเพื่อขอเข้าใช้งานระบบ</p>
  
  <label>ชื่อ - นามสกุล</label>
  <input type="text" id="name" placeholder="นาย/นางสาว..." required>
  
  <label>ฝ่าย / แผนก</label>
  <select id="department"></select>

  <label>ตำแหน่ง</label>
  <select id="position"></select>
  
  <label>อีเมล (ถ้ามี / ใช้สำหรับเข้าเว็บ Admin)</label>
  <input type="email" id="email" placeholder="example@coopkku.com">
  
  <button class="btn" onclick="registerUser()" id="btnReg">ยืนยันการลงทะเบียน</button>
</div>

<div class="card hide" id="waitForm">
  <div style="font-size:50px; margin-bottom:10px;">⏳</div>
  <h2 style="color:#f59e0b;">รอการอนุมัติ</h2>
  <p style="color:#64748b; font-size:15px; margin-top:10px;">คุณได้ลงทะเบียนแล้ว กรุณารอแอดมินอนุมัติบัญชีในระบบหลังบ้านก่อนเข้าใช้งานครับ</p>
</div>

<script>
  const db = window.supabase.createClient(AppConfig.SUPABASE_URL, AppConfig.SUPABASE_ANON_KEY);
  let lineUserId = '';

  window.onload = async () => {
    const deptHtml = AppConfig.DEPARTMENTS.map(d => `<option value="${d}">${d}</option>`).join('');
    const posHtml = AppConfig.POSITIONS.map(p => `<option value="${p}">${p}</option>`).join('');
    document.getElementById('department').innerHTML = deptHtml;
    document.getElementById('position').innerHTML = posHtml;

    await liff.init({ liffId: AppConfig.LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    
    const profile = await liff.getProfile();
    lineUserId = profile.userId;
    document.getElementById('uImg').src = profile.pictureUrl || 'https://via.placeholder.com/150';

    const { data } = await db.from('employees').select('status').eq('line_user_id', lineUserId).maybeSingle();
    
    if (data) {
      if (data.status === 'pending') {
        document.getElementById('regForm').classList.add('hide');
        document.getElementById('waitForm').classList.remove('hide');
      } else if (data.status === 'active') {
        window.location.replace('index.html');
      }
    }
  };

  async function registerUser() {
    const name = document.getElementById('name').value.trim();
    if (!name) return alert('กรุณากรอกชื่อ-สกุล');
    
    document.getElementById('btnReg').innerText = "กำลังบันทึกข้อมูล...";

    const { error } = await db.from('employees').insert([{
      line_user_id: lineUserId,
      name: name,
      department: document.getElementById('department').value,
      position: document.getElementById('position').value,
      email: document.getElementById('email').value || null,
      status: 'pending' 
    }]);

    if (error) {
      alert("❌ ไม่สามารถลงทะเบียนได้: " + error.message);
      document.getElementById('btnReg').innerText = "ยืนยันการลงทะเบียน";
    } else {
      document.getElementById('regForm').classList.add('hide');
      document.getElementById('waitForm').classList.remove('hide');
    }
  }
</script>
</body>
</html>
